; =============================================================================
; .user.ini — Per-directory PHP configuration for production (InfinityFree).
; Hides PHP errors from visitors while logging them server-side.
; PHP reloads this file every user_ini.cache_ttl seconds (default: 300).
;
; On InfinityFree: this file is respected in the document root.
; To inspect logged errors, use the File Manager or Error Logs in the
; hosting control panel.
; =============================================================================

; Hide all errors from browser output — never expose stack traces to visitors.
display_errors = Off

; Write errors to the server-side log instead of discarding them.
log_errors = On

; Capture all error levels in the log.
error_reporting = E_ALL
